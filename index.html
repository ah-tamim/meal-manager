<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Manager Dashboard</title>
    <style>
        /* Crisp Professional Light Theme Configuration */
        :root {
            --background: #f8fafc;    /* Clean, bright off-white background */
            --surface: #ffffff;       /* Pure white container backing */
            --surface-hover: #f1f5f9; /* Soft gray for button hover states */
            --border: #e2e8f0;        /* Subtle divider grid lines */
            --text-main: #0f172a;     /* Sharp, readable charcoal/black text */
            --text-muted: #64748b;    /* Elegant slate gray for sub-info */
            
            /* Animated Tab Gradient Shades (Sophisticated Royal/Indigo Blue) */
            --gradient-start: #2563eb; 
            --gradient-end: #4f46e5;   
            --accent-text: #ffffff;   
            
            --radius-lg: 12px;
            --radius-md: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 32px 16px;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 93vh;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        /* Centered Header Branding Layout */
        header {
            margin-bottom: 28px;
            text-align: center; /* FIXED: Centered top text */
        }

        h1 { 
            margin: 0 0 6px 0; 
            font-size: 28px; 
            font-weight: 700; 
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .meta-info { 
            font-size: 14px; 
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Centered Layout for the Navigation Container */
        .tabs-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        /* 2-Shade Animated Segmented Navigation Hub */
        .tabs-container {
            background: var(--surface);
            padding: 6px;
            border-radius: var(--radius-lg);
            display: inline-flex;
            gap: 4px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-md);
            position: relative;
            z-index: 1;
            background-size: 200% auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn:hover { 
            color: var(--text-main);
            background-color: var(--surface-hover);
        }

        /* Active Tab - 2-Shade Animated Gradient Switch */
        .tab-btn.active {
            color: var(--accent-text);
            background-image: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 50%, var(--gradient-start) 100%);
            animation: gradientShift 4s ease infinite;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        /* Smooth Moving Gradient Animation Background */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Premium Presentation Frame Container */
        .frame-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            width: 100%;
            height: 780px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Clean Minimal Footer Notice */
        footer {
            text-align: center;
            padding-top: 40px;
            padding-bottom: 10px;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="app-title">Penthouse - Meal Manager</h1>
        <div class="meta-info">Real-time Monthly Meal Management •  &copy; -  <strong>A.H.T.</strong></div>
    </header>

    <!-- Centered Navigation Hub Wrapper -->
    <div class="tabs-wrapper">
        <div class="tabs-container" id="tab-headers"></div>
    </div>

    <!-- Spreadsheet Embed Window -->
    <div class="frame-wrapper">
        <iframe id="sheet-frame" src="" title="Google Sheet Data View"></iframe>
    </div>
</div>

<!-- FIXED: Your Custom Copyright Footer with Social Link -->
<footer>
&copy; <a href="https://facebook.com/aht.ahtamim" target="_blank" style="color: var(--text-muted); text-decoration: none; font-weight: 500;">A.H.T ; Meal Manager 2026. All Rights Reserved.</a>
    
    <span style="margin: 0 8px; color: #cbd5e1;">•</span>
    <a href="https://facebook.com/aht.ahtamim" target="_blank" style="color: #1877f2; text-decoration: none; font-weight: 600;">Connect with me on Facebook</a>
</footer>

<script>
    const sheetTabs = {
        "Meal Tracker": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFYbS6wSRW4x6myxw2u3OvFUM_BoIrE08IJ_y89ErSRI7X99j-MnGZ_J6FgTaO8O3YOJ_YkXKUTiGP/pubhtml?gid=0&single=true&widget=false&headers=false",
        "Bazar & Extra": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFYbS6wSRW4x6myxw2u3OvFUM_BoIrE08IJ_y89ErSRI7X99j-MnGZ_J6FgTaO8O3YOJ_YkXKUTiGP/pubhtml?gid=1749425604&single=true&widget=false&headers=false",
        "Calculations": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFYbS6wSRW4x6myxw2u3OvFUM_BoIrE08IJ_y89ErSRI7X99j-MnGZ_J6FgTaO8O3YOJ_YkXKUTiGP/pubhtml?gid=1496868087&single=true&widget=false&headers=false",
        "Basa Vara": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFYbS6wSRW4x6myxw2u3OvFUM_BoIrE08IJ_y89ErSRI7X99j-MnGZ_J6FgTaO8O3YOJ_YkXKUTiGP/pubhtml?gid=56779445&single=true&widget=false&headers=false"
    };

    const headersContainer = document.getElementById('tab-headers');
    const sheetFrame = document.getElementById('sheet-frame');

    function switchTab(url) {
        sheetFrame.src = url;
    }

    function initializeDashboard() {
        Object.keys(sheetTabs).forEach((tabName, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.textContent = tabName;
            
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchTab(sheetTabs[tabName]);
            });
            
            headersContainer.appendChild(btn);
            
            if (index === 0) {
                switchTab(sheetTabs[tabName]);
            }
        });
    }

    initializeDashboard();
</script>

</body>
</html>
